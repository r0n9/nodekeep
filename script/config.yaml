debug: true
httpport: 8008
auth:
  local:
    enabled: true
    username: "admin"
    password: "nodekeep"
agent:
  install_host: "agent_install_host"
  tls: true
oauth2:
  type: "github" #Oauth2 登录接入类型，gitee/github
  admin: "admin_logins" #管理员列表，半角逗号隔开
  clientid: "github_oauth_client_id" # 在 https://github.com/settings/developers 创建，无需审核 Callback 填 http(s)://域名或IP/oauth2/callback
  clientsecret: "github_oauth_client_secret"
site:
  brand: "nodekeep"
  cookiename: "nodekeep-dashboard" #浏览器 Cookie 字段名，可不改
