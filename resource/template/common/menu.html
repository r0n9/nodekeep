{{define "common/menu"}}
<header class="nk-topbar{{if .IsAdminPage}} nk-admin-topbar{{else}} nk-public-topbar{{end}}">
    <div class="ui container nk-topbar-inner">
        <a class="nk-brand{{if eq .MatchedPath "/"}} active{{end}}" href="/">
            <img src="/static/logo.svg" alt="nodekeep">
            <span class="nk-brand-name">{{.Conf.Site.Brand}}</span>
        </a>

        <nav class="nk-nav" aria-label="主导航">
            {{if .IsAdminPage}}
            <a class='{{if eq .MatchedPath "/server"}}active{{end}}' href="/server"><i class="server icon"></i>服务器</a>
            <a class='{{if eq .MatchedPath "/monitor"}}active{{end}}' href="/monitor"><i class="rss icon"></i>服务监控</a>
            <a class='{{if eq .MatchedPath "/cron"}}active{{end}}' href="/cron"><i class="clock icon"></i>计划任务</a>
            <a class='{{if eq .MatchedPath "/notification"}}active{{end}}' href="/notification"><i class="bell icon"></i>告警通知</a>
            <a class='{{if eq .MatchedPath "/setting"}}active{{end}}' href="/setting"><i class="setting icon"></i>系统设置</a>
            {{else}}
            <a class='{{if eq .MatchedPath "/"}}active{{end}}' href="/"><i class="server icon"></i>节点概览</a>
            <a class='{{if eq .MatchedPath "/service"}}active{{end}}' href="/service"><i class="rss icon"></i>服务状态</a>
            {{end}}
        </nav>

        <div class="nk-account">
            {{if .Admin}}
            <div class="ui simple dropdown nk-account-menu">
                <div class="text">
                    <span>{{.Admin.Name}}</span>
                </div>
                <i class="dropdown icon"></i>
                <div class="menu">
                    {{if .IsAdminPage}}
                    <a class="item" href="/"><i class="chart area icon"></i>返回前台</a>
                    {{else}}
                    <a class="item" href="/server"><i class="terminal icon"></i>管理后台</a>
                    {{end}}
                    <button type="button" class="item" onclick="showConfirm('确认注销？','注销后您必须重新登录才能使用',logout,{{.Admin.ID}})">
                        <i class="logout icon"></i>注销登录
                    </button>
                </div>
            </div>
            {{else}}
            <a href="/login" class="ui primary button nk-login-button"><i class="sign-in icon"></i>登录</a>
            {{end}}
        </div>
    </div>
</header>
{{template "component/confirm" .}}
{{end}}
