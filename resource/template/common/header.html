{{define "common/header"}}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<meta http-equiv="Cache-Control" content="no-transform">
	<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<meta name="renderer" content="webkit">
	<meta http-equiv="Cache-Control" content="no-transform">
	<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
	<meta name="theme-color" content="#14213d">
	<meta property="og:image" content="/static/logo.svg">
	<meta name="msapplication-TileColor" content="#14213d">
    <script>
        (function () {
            var key = 'nodekeep-color-mode'
            var mode = null
            try {
                mode = localStorage.getItem(key)
            } catch (error) {
            }
            if (mode !== 'light' && mode !== 'dark') {
                mode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
            }
            document.documentElement.setAttribute('data-theme', mode)
            document.documentElement.style.colorScheme = mode
        })()
    </script>
    <title>{{.Title}}</title>
    <link rel="stylesheet" type="text/css" href="/static/vendor/semantic-ui/semantic.min.css">
    <link rel="stylesheet" type="text/css" href="/static/semantic-ui-alerts.min.css">
    <link rel="stylesheet" type="text/css" href="/static/main.css?v2026063003">
    <link rel="shortcut icon" type="image/svg+xml" href="/static/favicon.svg" />
</head>

<body>
    {{end}}
