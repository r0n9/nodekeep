{{define "dashboard/setting"}}
{{template "common/header" .}}
{{template "common/menu" .}}
<main class="nk-page nk-admin-page">
    <div class="ui container">
        <div class="nk-page-head">
            <div>
                <p class="nk-eyebrow">System</p>
                <h1>系统设置</h1>
                <p>配置站点、登录方式、Agent 接入和通知行为。</p>
            </div>
            <button class="ui primary button" type="submit" form="settingForm"><i class="save icon"></i>保存设置</button>
        </div>

        <form id="settingForm" class="ui form nk-settings-form" onsubmit="return false;">
            <section class="nk-panel">
                <div class="nk-panel-head">
                    <div>
                        <h2>站点</h2>
                        <p>展示名称和前台访问控制。</p>
                    </div>
                </div>
                <div class="nk-form-grid">
                    <div class="field">
                        <label>站点标题</label>
                        <input type="text" name="Title" placeholder="nodekeep" value="{{.Conf.Site.Brand}}">
                    </div>
                    <div class="field">
                        <label>前台查看密码</label>
                        <input type="text" name="ViewPassword" placeholder="留空则公开访问" value="{{.Conf.Site.ViewPassword}}">
                    </div>
                    <div class="field nk-form-full">
                        <label>自定义代码</label>
                        <textarea name="CustomCode" placeholder="可填写 style 或 script">{{.Conf.Site.CustomCode}}</textarea>
                    </div>
                </div>
            </section>

            <section class="nk-panel">
                <div class="nk-panel-head">
                    <div>
                        <h2>管理员登录</h2>
                        <p>本地账号和 OAuth2 管理员名单。</p>
                    </div>
                </div>
                <div class="nk-form-grid">
                    <div class="field nk-form-full">
                        <label>管理员列表</label>
                        <input type="text" name="Admin" placeholder="1010,2020" value="{{.Conf.Oauth2.Admin}}">
                    </div>
                    <div class="field">
                        <label>本地管理员用户名</label>
                        <input type="text" name="LocalAuthUsername" placeholder="admin" value="{{.Conf.Auth.Local.Username}}">
                    </div>
                    <div class="field">
                        <label>本地管理员密码</label>
                        <input type="password" name="LocalAuthPassword" placeholder="留空则不修改" autocomplete="new-password">
                    </div>
                    <div class="field nk-form-full">
                        <div class="ui local-auth checkbox">
                            <input name="LocalAuthEnabled" type="checkbox" tabindex="0" class="hidden">
                            <label>启用本地账号登录</label>
                        </div>
                    </div>
                </div>
            </section>

            <section class="nk-panel">
                <div class="nk-panel-head">
                    <div>
                        <h2>Agent 接入</h2>
                        <p>控制后台复制出的 Agent 安装命令使用的连接地址。</p>
                    </div>
                </div>
                <div class="nk-form-grid">
                    <div class="field">
                        <label>Agent 安装地址</label>
                        <input type="text" name="AgentInstallHost" placeholder="example.com:443" value="{{.Conf.Agent.InstallHost}}">
                    </div>
                    <div class="field nk-checkbox-field">
                        <div class="ui agent-tls checkbox">
                            <input name="AgentTLS" type="checkbox" tabindex="0" class="hidden">
                            <label>Agent 使用 TLS 连接</label>
                        </div>
                    </div>
                </div>
            </section>

            <section class="nk-panel">
                <div class="nk-panel-head">
                    <div>
                        <h2>通知</h2>
                        <p>控制节点 IP 变化类提醒。</p>
                    </div>
                </div>
                <div class="field">
                    <div class="ui nf-ssl checkbox">
                        <input name="EnableIPChangeNotification" type="checkbox" tabindex="0" class="hidden">
                        <label>开启 IP 变更提醒</label>
                    </div>
                </div>
            </section>
        </form>
    </div>
</main>
{{template "common/footer" .}}
<script>
    $('#settingForm').submit(function () {
        $.post('/api/setting', $('#settingForm').serialize()).then((resp) => {
            if (resp.code == 200) {
                $.suiAlert({
                    title: '',
                    description: '修改成功',
                    type: 'success',
                    time: '3',
                    position: 'top-center',
                });
            } else {
                $.suiAlert({
                    title: '',
                    description:resp.message,
                    type: 'error',
                    time: '3',
                    position: 'top-center',
                });
            }
        }).error(err => {
            $.suiAlert({
                title: '',
                description:err,
                type: 'error',
                time: '3',
                position: 'top-center',
            });
        })
        return false;
    })
    $('.checkbox').checkbox()
    {{if .Conf.EnableIPChangeNotification}}
    $('.nf-ssl.checkbox').checkbox('set checked')
    {{end}}
    {{if .Conf.Auth.Local.Enabled}}
    $('.local-auth.checkbox').checkbox('set checked')
    {{end}}
    {{if .Conf.Agent.TLS}}
    $('.agent-tls.checkbox').checkbox('set checked')
    {{end}}
</script>
{{end}}
