{{define "dashboard/setting"}}
{{template "common/header" .}}
{{template "common/menu" .}}
<div class="nb-container">
    <div class="ui container">
        <form id="settingForm" class="ui large form" onsubmit="return false;">
            <div class="field">
                <label>站点标题</label>
                <input type="text" name="Title" placeholder="nodekeep" value="{{.Conf.Site.Brand}}" style="
                background: rgb(255 255 255 / 50%);
            ">
            </div>
            <div class="field">
                <label>管理员列表</label>
                <input type="text" name="Admin" placeholder="1010,2020" value="{{.Conf.Oauth2.Admin}}" style="
                background: rgb(255 255 255 / 50%);
            ">
            </div>
            <div class="field">
                <label>本地管理员用户名</label>
                <input type="text" name="LocalAuthUsername" placeholder="admin" value="{{.Conf.Auth.Local.Username}}" style="
                background: rgb(255 255 255 / 50%);
            ">
            </div>
            <div class="field">
                <label>本地管理员密码</label>
                <input type="password" name="LocalAuthPassword" placeholder="留空则不修改" autocomplete="new-password" style="
                background: rgb(255 255 255 / 50%);
            ">
            </div>
            <div class="field">
                <div class="ui local-auth checkbox">
                    <input name="LocalAuthEnabled" type="checkbox" tabindex="0" class="hidden">
                    <label>启用本地账号登录</label>
                </div>
            </div>
            <div class="field" style="
            background: rgb(255 255 255 / 50%);
        ">
                <select name="Theme">
                    <option value="default"{{if eq .Conf.Site.Theme "default"}} selected="selected"{{end}}>默认主题</option>
                    <option value="daynight"{{if eq .Conf.Site.Theme "daynight"}} selected="selected"{{end}}>JackieSung DayNight</option>
                    <option value="hotaru"{{if eq .Conf.Site.Theme "hotaru"}} selected="selected"{{end}}>CokeMine Hotaru</option>
                </select>
            </div>
            <div class="field">
                <label>自定义代码(style、script 都可以)</label>
                <textarea name="CustomCode" style="
                background: rgb(255 255 255 / 50%);
            ">{{.Conf.Site.CustomCode}}</textarea>
            </div>
            <div class="field">
                <label>前台查看密码</label>
                <input type="text" name="ViewPassword" placeholder="" value="{{.Conf.Site.ViewPassword}}" style="
                background: rgb(255 255 255 / 50%);
            ">
            </div>
            <div class="field">
                <label>Agent 安装地址</label>
                <input type="text" name="AgentInstallHost" placeholder="example.com:443" value="{{.Conf.Agent.InstallHost}}" style="
                background: rgb(255 255 255 / 50%);
            ">
            </div>
            <div class="field">
                <div class="ui agent-tls checkbox">
                    <input name="AgentTLS" type="checkbox" tabindex="0" class="hidden">
                    <label>Agent 使用 TLS 连接</label>
                </div>
            </div>
            <div class="field">
                <div class="ui nf-ssl checkbox">
                    <input name="EnableIPChangeNotification" type="checkbox" tabindex="0" class="hidden">
                    <label>开启 IP 变更提醒</label>
                </div>
            </div>
            <button class="ui button" type="submit">保存</button>
        </form>
    </div>
</div>
{{template "common/footer" .}}
<script>
    $('#settingForm').submit(function () {
        $.post('/api/setting', $('#settingForm').serialize()).then((resp) => {
            if (resp.code == 200) {
                $.suiAlert({
                    title: '',
                    description: '修改成功',
                    type: 'success',
                    time: '3',
                    position: 'top-center',
                });
            } else {
                $.suiAlert({
                    title: '',
                    description:resp.message,
                    type: 'error',
                    time: '3',
                    position: 'top-center',
                });
            }
        }).error(err => {
            $.suiAlert({
                title: '',
                description:err,
                type: 'error',
                time: '3',
                position: 'top-center',
            });
        })
        return false;
    })
    $('.checkbox').checkbox()
    {{if .Conf.EnableIPChangeNotification}}
    $('.nf-ssl.checkbox').checkbox('set checked')
    {{end}}
    {{if .Conf.Auth.Local.Enabled}}
    $('.local-auth.checkbox').checkbox('set checked')
    {{end}}
    {{if .Conf.Agent.TLS}}
    $('.agent-tls.checkbox').checkbox('set checked')
    {{end}}
</script>
{{end}}
