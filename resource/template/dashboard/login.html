{{define "dashboard/login"}}
{{template "common/header" .}}
<div class="login nb-container">
    <div class="ui center aligned grid">
        <div class="column">
            <h2 class="ui teal image header">
                <img src="static/logo.svg" class="image">
                <div class="content">
                    登录 {{.Conf.Site.Brand}}
                </div>
            </h2>
            {{if .Conf.Auth.Local.Enabled}}
            <form class="ui large form" action="/login" method="POST">
                <div class="field">
                    <input type="text" name="Username" placeholder="用户名" autocomplete="username" required>
                </div>
                <div class="field">
                    <input type="password" name="Password" placeholder="密码" autocomplete="current-password" required>
                </div>
                <button class="ui fluid large teal submit button" type="submit">本地账号登录</button>
            </form>
            <div class="ui horizontal divider">或</div>
            {{end}}
            <a href="/oauth2/login" class="ui fluid large button">OAuth2 登录</a>
            <div class="ui message">
                OAuth2 支持 GitHub / Gitee，管理员名单由配置控制。
            </div>
        </div>
    </div>
</div>
{{template "common/footer" .}}
{{end}}
