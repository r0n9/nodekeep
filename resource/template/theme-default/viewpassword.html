{{define "theme-default/viewpassword"}}
{{template "common/header" .}}
{{if ts .CustomCode}}
{{.CustomCode|safe}}
{{end}}
<main class="nk-auth-page">
    <section class="nk-auth-panel">
        <a class="nk-auth-brand" href="/">
            <img src="/static/logo.svg" alt="nodekeep">
            <span>{{.Conf.Site.Brand}}</span>
        </a>
        <h1>验证查看密码</h1>
        <p>该前台页面已开启访问保护，请输入查看密码。</p>
        <form action="/view-password" method="POST" class="ui form nk-auth-form">
            <div class="field">
                <label>查看密码</label>
                <input type="password" name="Password" autocomplete="current-password" required>
            </div>
            <button class="ui fluid primary button" type="submit">确认访问</button>
        </form>
    </section>
</main>
{{template "common/footer" .}}
{{end}}
